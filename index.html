<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>فورم متابعة العملاء</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Cairo', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      padding: 30px 16px;
      direction: rtl;
    }

    .page-wrapper { max-width: 900px; margin: 0 auto; }

    .header {
      background: linear-gradient(135deg, #1a3c6e 0%, #2a5298 100%);
      border-radius: 16px 16px 0 0;
      padding: 28px 32px 20px;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .header-logo { font-size: 26px; font-weight: 900; }
    .header-logo span { color: #7eb8f7; }
    .header-sub { font-size: 13px; opacity: 0.75; margin-top: 3px; }
    .header-date-badge {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 10px;
      padding: 10px 18px;
      text-align: center;
      min-width: 130px;
    }
    .header-date-badge .date-label { font-size: 11px; opacity: 0.7; margin-bottom: 4px; }
    .header-date-badge .date-value { font-size: 15px; font-weight: 700; }

    .form-card {
      background: #fff;
      border-radius: 0 0 16px 16px;
      padding: 32px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }

    .section-title {
      font-size: 13px;
      font-weight: 700;
      color: #2a5298;
      letter-spacing: 0.5px;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-title::after { content: ''; flex: 1; height: 1px; background: #e2e8f4; }

    .type-toggle {
      display: inline-flex;
      border: 1.5px solid #d0d9ea;
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 22px;
    }
    .type-toggle input[type="radio"] { display: none; }
    .type-toggle label {
      padding: 10px 28px;
      font-family: 'Cairo', sans-serif;
      font-size: 14px;
      font-weight: 700;
      color: #4a5568;
      cursor: pointer;
      background: #f8fafd;
      transition: all 0.18s;
      border: none;
      user-select: none;
    }
    .type-toggle label + label { border-right: 1.5px solid #d0d9ea; }
    .type-toggle input[type="radio"]:checked + label { background: #2a5298; color: #fff; }
    .type-toggle input#typeCall:checked + label { background: #0f7c6e; color: #fff; }

    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .field-group { display: flex; flex-direction: column; gap: 6px; }

    label { font-size: 13px; font-weight: 600; color: #4a5568; }

    input[type="text"], input[type="date"], input[type="tel"], select, textarea {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #d0d9ea;
      border-radius: 8px;
      font-family: 'Cairo', sans-serif;
      font-size: 14px;
      color: #1a202c;
      background: #f8fafd;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      direction: rtl;
    }
    input:focus, select:focus, textarea:focus {
      border-color: #2a5298;
      box-shadow: 0 0 0 3px rgba(42,82,152,0.12);
      background: #fff;
    }
    textarea { resize: vertical; min-height: 80px; }

    .status-grid { display: flex; flex-wrap: wrap; gap: 8px; }
    .status-grid input[type="radio"] { display: none; }
    .status-grid label {
      padding: 7px 16px;
      border: 1.5px solid #d0d9ea;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      color: #4a5568;
      cursor: pointer;
      transition: all 0.18s;
      background: #f8fafd;
      user-select: none;
    }
    .pill-interest input[type="radio"]:checked + label { background: #38a169; color:#fff; border-color: #38a169; }
    .pill-pending  input[type="radio"]:checked + label { background: #d69e2e; color:#fff; border-color: #d69e2e; }
    .pill-closed   input[type="radio"]:checked + label { background: #e53e3e; color:#fff; border-color: #e53e3e; }
    .pill-followup input[type="radio"]:checked + label { background: #6b46c1; color:#fff; border-color: #6b46c1; }
    .pill-deal     input[type="radio"]:checked + label { background: #2b6cb0; color:#fff; border-color: #2b6cb0; }

    .divider { height: 1px; background: #e8eef6; margin: 24px 0; }

    .actions { display: flex; gap: 12px; justify-content: flex-end; margin-top: 28px; flex-wrap: wrap; }
    .btn {
      padding: 11px 28px;
      border-radius: 9px;
      font-family: 'Cairo', sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      border: none;
      transition: all 0.18s;
    }
    .btn-primary { background: linear-gradient(135deg, #1a3c6e, #2a5298); color: #fff; box-shadow: 0 3px 10px rgba(42,82,152,0.3); }
    .btn-primary:hover { box-shadow: 0 5px 16px rgba(42,82,152,0.45); transform: translateY(-1px); }
    .btn-secondary { background: #f0f4f8; color: #4a5568; border: 1.5px solid #d0d9ea; }
    .btn-secondary:hover { background: #e2e8f4; }
    .btn-print { background: #fff; color: #2a5298; border: 1.5px solid #2a5298; }
    .btn-print:hover { background: #eef3fc; }

    .table-section { margin-top: 32px; }
    .table-wrapper { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
    thead tr { background: #2a5298; color: #fff; }
    thead th { padding: 11px 12px; text-align: right; font-weight: 600; white-space: nowrap; }
    tbody tr { border-bottom: 1px solid #e8eef6; transition: background 0.15s; }
    tbody tr:nth-child(even) { background: #f8fafd; }
    tbody tr:hover { background: #f0f6ff; }
    tbody td { padding: 9px 12px; color: #2d3748; vertical-align: middle; }
    .badge-visit { background: #ebf4ff; color: #2a5298; padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 700; white-space: nowrap; }
    .badge-call  { background: #e6fffa; color: #0f7c6e; padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 700; white-space: nowrap; }
    tbody td input[type="text"], tbody td input[type="date"] {
      padding: 5px 8px; font-size: 12px; background: transparent; border: 1px dashed #c0cce0;
    }
    tbody td input:focus { background: #fff; border-style: solid; }

    .add-row-btn {
      margin-top: 10px;
      background: #eef3fc; color: #2a5298;
      border: 1.5px dashed #2a5298; border-radius: 8px;
      padding: 8px 20px; font-family: 'Cairo', sans-serif;
      font-size: 13px; font-weight: 700; cursor: pointer; transition: background 0.15s;
    }
    .add-row-btn:hover { background: #dce8fb; }

    .delete-btn { background: none; border: none; color: #e53e3e; cursor: pointer; font-size: 16px; padding: 2px 6px; border-radius: 4px; }
    .delete-btn:hover { background: #fff5f5; }

    .toast {
      position: fixed; bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1a3c6e; color: #fff;
      padding: 13px 28px; border-radius: 10px;
      font-family: 'Cairo', sans-serif; font-weight: 600; font-size: 14px;
      box-shadow: 0 6px 24px rgba(0,0,0,0.2);
      transition: transform 0.35s cubic-bezier(.34,1.56,.64,1);
      z-index: 999; white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    @media print {
      @page { size: A4 landscape; margin: 8mm 10mm; }
      body { background: #fff; padding: 0; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .page-wrapper { max-width: 100%; }
      .type-toggle, .section-title:not(.table-title), .grid-2, .field-group,
      .status-grid, .divider, .actions, .add-row-btn, .delete-btn, .toast { display: none !important; }
      .form-card { box-shadow: none; border-radius: 0; padding: 12px 0 0; }
      .header { border-radius: 0; page-break-after: avoid; }
      .table-section { margin-top: 10px !important; }
      .table-title { display: flex !important; margin-bottom: 10px; }
      table { font-size: 10.5px; width: 100%; }
      thead tr { background: #2a5298 !important; -webkit-print-color-adjust: exact; }
      thead th { padding: 8px 8px; }
      tbody td { padding: 7px 8px; }
      tbody tr:nth-child(even) { background: #f0f4f8 !important; -webkit-print-color-adjust: exact; }
      .badge-visit, .badge-call { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      tbody td input { border: none !important; background: transparent !important; font-family: 'Cairo', sans-serif; }
    }

    @media (max-width: 580px) {
      .grid-2 { grid-template-columns: 1fr; }
      .header { flex-direction: column; align-items: flex-start; }
      .type-toggle label { padding: 9px 18px; font-size: 13px; }
    }
  </style>
</head>
<body>
<div class="page-wrapper">

  <div class="header">
    <div>
      <div class="header-logo">متابعة <span>العملاء</span></div>
      <div class="header-sub">سجل الزيارات والاتصالات اليومية</div>
    </div>
    <div class="header-date-badge">
      <div class="date-label">تاريخ اليوم</div>
      <div class="date-value" id="todayDate">—</div>
    </div>
  </div>

  <div class="form-card">

    <div class="type-toggle">
      <input type="radio" name="contactType" id="typeVisit" value="زيارة" checked />
      <label for="typeVisit">🚗 زيارة</label>
      <input type="radio" name="contactType" id="typeCall" value="اتصال" />
      <label for="typeCall">📞 اتصال</label>
    </div>

    <div class="section-title">بيانات العميل</div>
    <div class="grid-2">
      <div class="field-group">
        <label for="clientName">اسم العميل</label>
        <input type="text" id="clientName" placeholder="أدخل اسم العميل" />
      </div>
      <div class="field-group">
        <label for="clientPhone">رقم الهاتف</label>
        <input type="tel" id="clientPhone" placeholder="05X XXX XXXX" />
      </div>
      <div class="field-group">
        <label for="clientCompany">اسم الشركة / الجهة</label>
        <input type="text" id="clientCompany" placeholder="اختياري" />
      </div>
      <div class="field-group">
        <label for="visitDate">التاريخ</label>
        <input type="date" id="visitDate" />
      </div>
    </div>

    <div class="divider"></div>

    <div class="section-title">تفاصيل التواصل</div>
    <div class="grid-2">
      <div class="field-group">
        <label for="visitPurpose">الهدف</label>
        <select id="visitPurpose">
          <option value="">اختر الهدف</option>
          <option>عرض منتج</option>
          <option>متابعة طلبية</option>
          <option>تسليم بضاعة</option>
          <option>تحصيل</option>
          <option>شكوى أو استفسار</option>
          <option>زيارة مجاملة</option>
          <option>أخرى</option>
        </select>
      </div>
      <div class="field-group">
        <label for="visitAgent">اسم المندوب</label>
        <input type="text" id="visitAgent" placeholder="اسم المندوب المسؤول" />
      </div>
    </div>

    <div class="field-group" style="margin-top:16px">
      <label for="visitNotes">ملاحظات</label>
      <textarea id="visitNotes" placeholder="سجّل تفاصيل ما تم مناقشته..."></textarea>
    </div>

    <div class="divider"></div>

    <div class="section-title">النتيجة</div>
    <div class="status-grid">
      <div class="pill-interest"><input type="radio" name="visitResult" id="r1" value="مهتم" /><label for="r1">✅ مهتم</label></div>
      <div class="pill-pending"><input type="radio" name="visitResult" id="r2" value="متردد" /><label for="r2">⏳ متردد</label></div>
      <div class="pill-deal"><input type="radio" name="visitResult" id="r3" value="تم الاتفاق" /><label for="r3">🤝 تم الاتفاق</label></div>
      <div class="pill-followup"><input type="radio" name="visitResult" id="r4" value="يحتاج متابعة" /><label for="r4">🔁 يحتاج متابعة</label></div>
      <div class="pill-closed"><input type="radio" name="visitResult" id="r5" value="رفض" /><label for="r5">❌ رفض</label></div>
    </div>

    <div class="field-group" style="margin-top:16px">
      <label for="nextAction">الإجراء التالي / موعد المتابعة</label>
      <input type="text" id="nextAction" placeholder="مثال: الاتصال بعد أسبوع، إرسال عرض سعر..." />
    </div>

    <div class="actions">
      <button class="btn btn-secondary" onclick="clearForm()">مسح البيانات</button>
      <button class="btn btn-print" onclick="window.print()">🖨️ طباعة الجدول</button>
      <button class="btn btn-primary" onclick="addToTable()">➕ إضافة للجدول</button>
    </div>

    <div class="table-section">
      <div class="divider"></div>
      <div class="section-title table-title">سجل الزيارات والاتصالات</div>
      <div class="table-wrapper">
        <table id="visitsTable">
          <thead>
            <tr>
              <th>#</th>
              <th>النوع</th>
              <th>التاريخ</th>
              <th>اسم العميل</th>
              <th>الهاتف</th>
              <th>الهدف</th>
              <th>النتيجة</th>
              <th>الملاحظات</th>
              <th>الإجراء التالي</th>
              <th>المندوب</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="visitsBody">
            <tr id="emptyRow">
              <td colspan="11" style="text-align:center;color:#a0aec0;padding:24px;font-size:13px;">
                لا توجد سجلات بعد — أضف زيارة أو اتصال من الفورم أعلاه
              </td>
            </tr>
          </tbody>
        </table>
      </div>
      <button class="add-row-btn" onclick="addEmptyRow()">＋ إضافة صف فارغ</button>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const today = new Date();
  const opts = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
  document.getElementById('todayDate').textContent = today.toLocaleDateString('ar-SA', opts);
  document.getElementById('visitDate').value = today.toISOString().split('T')[0];

  let rowCount = 0;

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2800);
  }

  function getContactType() {
    return document.querySelector('input[name="contactType"]:checked')?.value || 'زيارة';
  }

  function addToTable() {
    const name    = document.getElementById('clientName').value.trim();
    const phone   = document.getElementById('clientPhone').value.trim();
    const date    = document.getElementById('visitDate').value;
    const purpose = document.getElementById('visitPurpose').value;
    const agent   = document.getElementById('visitAgent').value.trim();
    const notes   = document.getElementById('visitNotes').value.trim();
    const result  = document.querySelector('input[name="visitResult"]:checked')?.value || '—';
    const next    = document.getElementById('nextAction').value.trim();
    const type    = getContactType();

    if (!name) { showToast('⚠️ الرجاء إدخال اسم العميل'); return; }

    removeEmptyMsg();
    rowCount++;
    const badgeClass = type === 'اتصال' ? 'badge-call' : 'badge-visit';
    const icon = type === 'اتصال' ? '📞' : '🚗';
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td style="font-weight:700;color:#2a5298">${rowCount}</td>
      <td><span class="${badgeClass}">${icon} ${type}</span></td>
      <td>${date || '—'}</td>
      <td style="font-weight:600">${name}</td>
      <td dir="ltr">${phone || '—'}</td>
      <td>${purpose || '—'}</td>
      <td>${result}</td>
      <td style="max-width:160px;white-space:pre-wrap;word-break:break-word">${notes || '—'}</td>
      <td>${next || '—'}</td>
      <td>${agent || '—'}</td>
      <td><button class="delete-btn" onclick="deleteRow(this)">🗑</button></td>
    `;
    document.getElementById('visitsBody').appendChild(tr);
    showToast('✅ تمت الإضافة بنجاح');
    clearForm();
  }

  function addEmptyRow() {
    removeEmptyMsg();
    rowCount++;
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td style="font-weight:700;color:#2a5298">${rowCount}</td>
      <td><input type="text" placeholder="النوع" style="width:70px" /></td>
      <td><input type="date" style="width:130px" /></td>
      <td><input type="text" placeholder="اسم العميل" style="width:120px" /></td>
      <td><input type="text" placeholder="الهاتف" style="width:100px" dir="ltr" /></td>
      <td><input type="text" placeholder="الهدف" style="width:100px" /></td>
      <td><input type="text" placeholder="النتيجة" style="width:90px" /></td>
      <td><input type="text" placeholder="ملاحظات" style="width:120px" /></td>
      <td><input type="text" placeholder="الإجراء التالي" style="width:130px" /></td>
      <td><input type="text" placeholder="المندوب" style="width:90px" /></td>
      <td><button class="delete-btn" onclick="deleteRow(this)">🗑</button></td>
    `;
    document.getElementById('visitsBody').appendChild(tr);
  }

  function deleteRow(btn) {
    btn.closest('tr').remove();
    if (!document.getElementById('visitsBody').children.length) addEmptyMsg();
  }

  function removeEmptyMsg() {
    const e = document.getElementById('emptyRow');
    if (e) e.remove();
  }

  function addEmptyMsg() {
    const tr = document.createElement('tr');
    tr.id = 'emptyRow';
    tr.innerHTML = `<td colspan="11" style="text-align:center;color:#a0aec0;padding:24px;font-size:13px;">
      لا توجد سجلات بعد — أضف زيارة أو اتصال من الفورم أعلاه
    </td>`;
    document.getElementById('visitsBody').appendChild(tr);
  }

  function clearForm() {
    ['clientName','clientPhone','clientCompany','visitAgent','visitNotes','nextAction']
      .forEach(id => document.getElementById(id).value = '');
    document.getElementById('visitDate').value = today.toISOString().split('T')[0];
    document.getElementById('visitPurpose').value = '';
    const checked = document.querySelector('input[name="visitResult"]:checked');
    if (checked) checked.checked = false;
    document.getElementById('typeVisit').checked = true;
  }
</script>
</body>
</html>
